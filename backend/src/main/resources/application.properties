server.port=8080
spring.application.name=simulation-backend

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/simulation
spring.datasource.username=simulation
spring.datasource.password=simulation
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Seed data
app.table-md-path=../table.md
